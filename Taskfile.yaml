version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

# The .taskfiles/ segmentation is intentional, even where a namespace holds
# only thin Dagger wrappers — do not flatten it into this file.
includes:
  dagger: ./.taskfiles/dagger/Taskfile.yaml
  dev: ./.taskfiles/dev/Taskfile.yaml
  fmt: ./.taskfiles/fmt/Taskfile.yaml
  gh: ./.taskfiles/gh/Taskfile.yaml
  git: ./.taskfiles/git/Taskfile.yaml
  go: ./.taskfiles/go/Taskfile.yaml

tasks:
  default:
    cmd: task -l

  format:
    desc: Formats, tidies, and generates code via Dagger
    summary: |
      Runs every registered Dagger generator (go:tidy, go:generate) and
      applies the changes. Supersedes go:format and fmt:format, which
      remain for selective runs.
    cmds:
      - dagger generate --auto-apply

  lint:
    desc: Runs all lint targets
    deps: [go:lint, gh:lint, fmt:lint]

  docs:
    desc: Runs all docs targets
    deps: [go:docs]

  test:
    desc: Runs all test targets
    deps: [go:test]

  check:
    desc: Runs all checks via Dagger
    cmds:
      - dagger check

  scan:
    desc: Scans source dependencies for vulnerabilities via Dagger
    cmds:
      - dagger call security scan-source

  pre-commit:
    desc: Runs all pre-commit targets
    cmds:
      - task: format
      - task: lint
      - task: test

  install:
    desc: Runs all install targets
    deps: [dev:install, git:hooks:install, install:nyaml]

  install:nyaml:
    desc: Builds and installs the nyaml binary
    cmds:
      - go install ./cmd/nyaml

  clean:
    desc: Removes build artifacts and caches
    cmds:
      - rm -rf dist/ .test/ .task/ .tmp/
